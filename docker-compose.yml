# Local dev data tier for Akasha RAG: PostgreSQL+pgvector, Redis, MinIO.
# The app (src/akasha) runs on the host and connects to these.
# Bring up:  docker compose up -d      Verify: see infra/README.md
name: akasha-rag

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: akasha-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-akasha_rag}
      POSTGRES_USER: ${POSTGRES_USER:-akasha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-akasha}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Runs ONCE on a fresh volume — enables vector/pgcrypto/citext.
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-akasha} -d ${POSTGRES_DB:-akasha_rag}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: akasha-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: akasha-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"          # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # web console
    volumes:
      - miniodata:/data
    restart: unless-stopped

  # One-shot: wait for MinIO, create the bucket, then exit 0.
  minio-setup:
    image: minio/mc
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-akasha-documents}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
        echo 'waiting for minio...'; sleep 2;
      done &&
      mc mb --ignore-existing local/$${MINIO_BUCKET} &&
      echo 'MinIO bucket ready: '$${MINIO_BUCKET}
      "
    restart: "no"

volumes:
  pgdata:
  redisdata:
  miniodata:
